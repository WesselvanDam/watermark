name: watermarker
description: "A tool to watermark images"
publish_to: "none"

version: 0.0.3+3

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  cupertino_icons: ^1.0.6
  exif: ^3.3.0
  file_picker: ^8.1.3
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.0.0
  flutter_web_plugins:
    sdk: flutter
  freezed_annotation: ^3.1.0
  go_router: ^17.2.3
  image: ^4.3.0
  intl: ^0.20.2
  json_annotation: ^4.9.0
  path: ^1.9.1
  riverpod_annotation: ^3.0.0
  shared_preferences: ^2.3.2
  slang: 4.10.0
  slang_flutter: 4.10.0

dev_dependencies:
  build_runner: ^2.4.11
  custom_lint: ^0.8.0
  flutter_lints: ^6.0.0
  freezed: ^3.2.0
  go_router_builder: ^4.0.1
  json_serializable: ^6.8.0
  lint: ^2.3.0
  riverpod_generator: ^3.0.0
  riverpod_lint: ^3.0.3
  slang_build_runner: 4.10.0

